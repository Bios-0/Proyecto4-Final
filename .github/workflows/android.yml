name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install Build Tools 30.0.3
        run: |
          # Usamos la ruta completa pero con Java 11
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "build-tools;30.0.3"

      - name: Build APK
        run: |
          npm install -g cordova@11.0.0
          cordova platform add android@10.1.2
          
          # Forzamos a Cordova a aceptar las licencias y usar AndroidX
          yes | cordova build android --prepare
          
          # Construcción ignorando errores de versiones de Gradle externas
          cordova build android --debug --device -- --gradleArg=-Pandroid.useAndroidX=true --gradleArg=-Pandroid.enableJetifier=true
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_11_X64 }}
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
