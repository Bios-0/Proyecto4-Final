name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android Build Tools 30.0.3
        run: |
          # Usamos la ruta completa del SDK Manager para que no diga "not found"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "build-tools;30.0.3"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.6'

      - name: Build APK
        run: |
          npm install -g cordova@11.0.0
          cordova platform add android@10.1.2
          
          # Forzamos Gradle 7.6
          mkdir -p platforms/android/gradle/wrapper
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-7.6-all.zip" > platforms/android/gradle/wrapper/gradle-wrapper.properties
          
          # Construcción final
          cordova build android --debug --device -- --gradleArg=-Pandroid.useAndroidX=true --gradleArg=-Pandroid.enableJetifier=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MiJuego-CNI
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
