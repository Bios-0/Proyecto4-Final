name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.6'

      - name: Build APK
        run: |
          npm install -g cordova@11.0.0
          cordova platform add android@10.1.2
          
          # Forzamos la configuración de Gradle
          mkdir -p platforms/android/gradle/wrapper
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-7.6-all.zip" > platforms/android/gradle/wrapper/gradle-wrapper.properties
          
          # Limpieza de seguridad
          cd platforms/android && ./gradlew clean && cd ../..
          
          # Construcción
          cordova build android --debug --device -- --gradleArg=-Pandroid.useAndroidX=true --gradleArg=-Pandroid.enableJetifier=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MiJuego-CNI
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
