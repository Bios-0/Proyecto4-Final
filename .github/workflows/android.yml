name: Build APK Final Real
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # Java 17 para que el sdkmanager no falle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build con Cordova
        run: |
          npm install -g cordova@11.0.0
          cordova platform add android@10.1.2
          # Forzamos a que use las herramientas de build 30.0.3
          sdkmanager "build-tools;30.0.3"
          cordova build android --debug --device -- --gradleArg=-Pandroid.useAndroidX=true --gradleArg=-Pandroid.enableJetifier=true

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: MiJuego-Proyecto4
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
