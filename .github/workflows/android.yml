name: Build APK Directo
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Instalar Herramientas de Android
        run: |
          # Instalamos la versión exacta que pide Cordova 10
          sdkmanager --install "build-tools;30.0.3" "platforms;android-30"

      - name: Construir Proyecto
        run: |
          npm install -g cordova@11.0.0
          cordova platform add android@10.1.2
          
          # Forzamos la compatibilidad moderna
          echo "android.useAndroidX=true" >> platforms/android/gradle.properties
          echo "android.enableJetifier=true" >> platforms/android/gradle.properties
          
          cordova build android --debug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: MiJuego-Proyecto4
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
