name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Build Tools 30.0.3
        run: |
          # Instalamos las herramientas que Cordova está pidiendo
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "build-tools;30.0.3" "platforms;android-30"

      - name: Instalar Gradle compatible
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.6'

      - name: Build APK
        run: |
          npm install -g cordova@11.0.0
          cordova platform add android@10.1.2
          
          # Forzamos Gradle 7.6
          mkdir -p platforms/android/gradle/wrapper
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-7.6-all.zip" > platforms/android/gradle/wrapper/gradle-wrapper.properties
          
          # Ajustes de compatibilidad
          echo "android.useAndroidX=true" >> platforms/android/gradle.properties
          echo "android.enableJetifier=true" >> platforms/android/gradle.properties
          
          cordova build android --debug

      - name: Entregar APK
        uses: actions/upload-artifact@v4
        with:
          name: MiJuego-Final
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
